# Cloudflare Pages — OpenNext Wrangler Configuration
name = "the-book-club"
compatibility_date = "2025-05-01"
compatibility_flags = ["nodejs_compat"]

# Main entry point produced by opennextjs-cloudflare
main = ".open-next/worker.js"

# Static assets bucket
assets = { directory = ".open-next/assets", binding = "ASSETS" }

# KV namespace required by OpenNext for incremental cache (ISR)
# Create this in your Cloudflare dashboard and paste the ID below:
# [[kv_namespaces]]
# binding = "NEXT_CACHE_WORKERS_KV"
# id = "YOUR_KV_NAMESPACE_ID_HERE"

[build]
command = "npm run build"
